prSections:
    - title: Involved
      filters: is:open involves:@me -author:@me
    - title: "@hrfmmr"
      filters: author:@me
issuesSections:
    - title: All Issues
      filters: ""
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me

repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60

defaults:
    preview:
        open: true
        width: 100
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refeechIntervalMinutes: 30

theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true

keybindings:
  prs:
    - key: d
      name: "nvim: DiffviewOpen"
      command: ~/.config/gh-dash/scripts/pr-nvim.sh diffview {{.RepoPath}} {{.RepoName}} {{.PrNumber}} {{.HeadRefName}}
    - key: C
      name: "nvim: Octo pr edit"
      command: ~/.config/gh-dash/scripts/pr-nvim.sh octo {{.RepoPath}} {{.RepoName}} {{.PrNumber}} {{.HeadRefName}}
    - key: ctrl+r
      name: "PR review: codex + diffview + octo"
      command: ~/.config/gh-dash/scripts/pr-review-panes.sh {{.RepoPath}} {{.RepoName}} {{.PrNumber}} {{.HeadRefName}}
    - key: c
      name: "PR review: claude + diffview + octo"
      command: ~/.config/gh-dash/scripts/pr-review-panes.sh {{.RepoPath}} {{.RepoName}} {{.PrNumber}} {{.HeadRefName}} claude
