model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
model_reasoning_effort = "high"
notify = ["python3", "/Users/hrfmmr/.codex/scripts/notify.py"]
personality = "pragmatic"
web_search = "live"

[features]
multi_agent = true
apps = true
prevent_idle_sleep = true
codex_hooks = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "weekly-limit"]

[mcp_servers.serena]
command = "uvx"
args = [
    "--from",
    "git+https://github.com/oraios/serena",
    "serena",
    "start-mcp-server",
    "--context",
    "codex",
    "--project",
    ".",
    "--enable-web-dashboard=false",
]
cwd = "."
startup_timeout_ms = 20_000
